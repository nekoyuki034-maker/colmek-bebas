<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Colmek Bebas</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: #fff;
}

/* NAV */
.nav {
    padding: 18px;
    background: #181818;
    font-weight: bold;
}

/* LIST GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 10px;
}
  .card {
    cursor: pointer;
    overflow: hidden;
  }

  .card img {
    width: 100%;
    /* Kunci utamanya di sini */
    aspect-ratio: 16 / 9; 
    object-fit: cover;
    display: block;
    border-radius: 8px;
  }

  .card-title {
    padding: 10px;
    font-weight: bold;
    font-size: 13px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;  
    overflow: hidden;
    text-overflow: ellipsis;
    
    /* Opsional: atur line-height agar jarak antar baris rapi */
    line-height: 1.4;
    height: 1.8em; 
  }

/* DETAIL */
.container {
    display: flex;
    gap: 25px;
    padding: 10px;
}

.left {
    flex: 2;
}

.right {
    flex: 1;
}

/* PLAYER */
.player {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #000;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
}

.player iframe {
    width: 100%;
    height: 400px;
    border: none;
    /* border-radius: 15px; */
}

/* MOBILE */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .player iframe {
        height: 220px;
    }
}

/* TAG */
.tag {
    display: inline-block;
    background: #272727;
    padding: 4px 10px;
    border-radius: 20px;
    margin: 2px;
    font-size: 12px;
}

/* BUTTON */
.btn {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    background: red;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="nav">Colmek Bebas</div>

<div id="app"></div>

<script>
let currentPage = 1;

/* ================= LIST PAGE ================= */
async function loadList(page = 1) {
    currentPage = page;

    const app = document.getElementById("app");
    app.innerHTML = "Loading...";

    const url = `https://avdbapi.com/api.php/provide/vod?ac=detail&pg=${page}&pagesize=12`;
    const res = await fetch(url);
    const data = await res.json();

    app.innerHTML = `
        <div class="grid">
            ${data.list.map(v => `
                <div class="card" onclick="loadDetail(${v.id})">
                    <img src="${v.thumb_url}">
                    <div class="card-title">${v.name}</div>
                </div>
            `).join('')}
        </div>

        <div style="text-align:center;">
            <button class="btn" onclick="loadList(${page-1})" ${page<=1?'disabled':''}>Prev</button>
            <button class="btn" onclick="loadList(${page+1})" ${page>=data.pagecount?'disabled':''}>Next</button>
        </div>
    `;
}

/* ================= DETAIL PAGE ================= */
async function loadDetail(id) {
    const app = document.getElementById("app");
    app.innerHTML = "Loading...";

    const url = `https://avdbapi.com/id/api.php/provide/vod?ac=detail&ids=${id}`;
    const res = await fetch(url);
    const data = await res.json();

    const v = data.list[0];
    const embed = v.episodes.server_data.Full.link_embed;

    app.innerHTML = `
        <button class="btn" onclick="loadList(${currentPage})">« Back</button>

        <div class="container">
            <div class="left">
                <div class="player">
                    <iframe src="${embed}" allowfullscreen></iframe>
                </div>

                <h3>${v.name}</h3>
                <div>${v.actor.join(', ')} • ${v.year} • ${v.time}</div>

                <div>
                    ${v.category.map(c => `<span class="tag">${c}</span>`).join('')}
                </div>

                <p>${v.description}</p>
            </div>

            <div class="right">
                <h4>Info</h4>
                <p>Code: ${v.movie_code}</p>
                <p>Country: ${v.country.join(', ')}</p>
                <p>Status: ${v.status}</p>
                <img src="${v.poster_url}" width="100%" style="border-radius:15px;">
            </div>
        </div>
    `;
}

/* INIT */
loadList();
</script>

</body>
  </html>
